<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2 class="header">Calculator 3000</h2>
    <div class="container">
        <div class="calculations">
            <input class="input__left" type="text" placeholder="Введите первое значение" id="firstInput">
            <input class="input__right" type="text" placeholder="Введите второе значение"  id="secondInput">
            <button class="sign" onclick="division()">+</button>
            <button class="sign" onclick="minus()">-</button>
            <button class="sign" onclick="multiple()">*</button>
            <button class="sign" id="division" onclick="division()">/</button>
        </div>
        <div class="result">
            <p class="result__text">Result</p>
            <div class="result__value" id="resultValue"></div>
        </div>
    </div>
    <script src="/script.js"></script>
</body>
</html>
